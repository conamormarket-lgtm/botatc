<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox - IA-ATC</title>
    <!-- Fuentes de Google: Inter para lectura, Outfit para acentos audaces -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 1. Nivel de Color Principal */
            --primary-color: #3b82f6;       
            --primary-hover: #2563eb;       
            /* 2. Nivel de Color de Acento */
            --accent-bg: #1e293b;           
            --accent-border: #334155;       
            --accent-hover-soft: #334155;   
            /* 3. Nivel de Color de Fondo General */
            --bg-main: #0f172a;             
            /* 4. Tipografías */
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            /* Otros */
            --text-main: #f8fafc;           
            --text-muted: #94a3b8;          
            --danger-color: #ef4444;        
            --success-color: #10b981;       
        }

        /* RESET Y BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        a { text-decoration: none; color: inherit; }

        /* LAYOUT PRINCIPAL (3 Columnas en Desktop) */
        .sidebar-nav {
            width: 70px;
            background-color: var(--bg-main);
            border-right: 1px solid var(--accent-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 0;
            z-index: 10;
        }

        .chat-list-panel {
            width: 340px;
            background-color: var(--bg-main);
            border-right: 1px solid var(--accent-border);
            display: flex;
            flex-direction: column;
            z-index: 5;
            transition: all 0.3s ease;
            min-height: 0;
        }

        .chat-viewer-panel {
            flex: 1;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0; /* previene desbordamiento en flex */
        }

        /* ---------------- LEFT SIDEBAR ---------------- */
        .nav-item {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            margin-bottom: 1rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-item:hover { color: var(--text-main); background-color: var(--accent-hover-soft); }
        .nav-item.active { color: var(--primary-color); background-color: rgba(59, 130, 246, 0.1); }
        .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .bot-status-indicator {
            margin-top: auto;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: {color_global};
            box-shadow: 0 0 10px {color_global};
            cursor: pointer;
        }

        /* ---------------- MIDDLE CHAT LIST ---------------- */
        .list-header {
            padding: 1.5rem 1.5rem 0 1.5rem;
            border-bottom: 1px solid var(--accent-border);
        }
        .list-header h2 {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }
        
        .list-tabs {
            display: flex;
            gap: 1.25rem;
            margin-top: 1.25rem;
        }
        .tab {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid transparent;
            transition: color 0.2s;
        }
        .tab:hover { color: var(--text-main); }
        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .chats-container {
            flex: 1;
            overflow-y: auto;
        }
        .chats-container::-webkit-scrollbar { width: 5px; }
        .chats-container::-webkit-scrollbar-thumb { background: var(--accent-border); border-radius: 10px; }

        .chat-row {
            padding: 1.1rem 1.25rem;
            border-bottom: 1px solid var(--accent-border);
            cursor: pointer;
            transition: background-color 0.2s;
            display: block;
        }
        .chat-row:hover { background-color: var(--accent-hover-soft); }
        .chat-row.active-row { background-color: var(--accent-bg); border-left: 3px solid var(--primary-color); padding-left: calc(1.25rem - 3px); }
        
        .chat-row-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.4rem;
        }
        .chat-name {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 0.5rem;
        }
        .chat-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .chat-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-badges {
            margin-top: 0.6rem;
            display: flex;
            gap: 0.4rem;
        }
        .badge {
            font-size: 0.65rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            background-color: var(--accent-border);
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-alert { background-color: rgba(239, 68, 68, 0.15); color: var(--danger-color); }

        /* ---------------- RIGHT CHAT VIEWER ---------------- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }
        .empty-state svg { width: 70px; height: 70px; margin-bottom: 1.5rem; opacity: 0.4; stroke-width: 1.5; }
        .empty-state h3 { font-family: var(--font-heading); font-size: 1.4rem; color: var(--text-main); margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.95rem; max-width: 320px; line-height: 1.6; }

        .btn-responsive-back {
            display: none;
            margin-right: 1rem;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }
        .btn-responsive-back:hover { color: var(--text-main); }

        {chat_view_css}

        /* ==================================================
           RESPONSIVE DESIGN (MÓVIL / TABLET)
           ================================================== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            /* Sidebar se convierte en Bottom Navigation Bar */
            .sidebar-nav {
                flex-direction: row;
                width: 100%;
                height: 65px;
                padding: 0;
                border-right: none;
                border-top: 1px solid var(--accent-border);
                order: 3; /* Al final de la columna */
                justify-content: space-around;
                background-color: var(--bg-main); /* para tapar info detrás si es necesario */
            }
            .nav-item { margin-bottom: 0; }
            .bot-status-indicator { margin: auto 0; margin-right: 1rem; }

            /* Contenedor central (hijos directos order 1 y 2) */
            .chat-list-panel, .chat-viewer-panel {
                width: 100%;
                flex: 1;
                border-right: none;
                order: 1;
            }

            /* LOGICA DE VISIBILIDAD SPA MÓVIL */
            /* Si class="view-list", muestra lista y oculta chat */
            body.view-list .chat-viewer-panel { display: none !important; }
            /* Si class="view-chat", muestra chat y oculta lista */
            body.view-chat .chat-list-panel { display: none !important; }
            
            body.view-chat .sidebar-nav { display: none !important; } /* Ocultar tab bar inferior en el chat si se desea más espacio */

            /* Mostrar el botón de regresar en el Header del Chat */
            .btn-responsive-back { display: flex; align-items: center; }
        }

    </style>
</head>
<body class="{body_class}">

    <!-- 1. BARRA LATERAL IZQUIERDA (Navegación Desktop / Bottom Mobile) -->
    <nav class="sidebar-nav">
        <!-- Inbox Icon -->
        <a href="/inbox" class="nav-item active" title="Bandeja de Entrada (Inbox)">
            <svg viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2" /><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" /></svg>
        </a>
        <!-- Agent Settings Icon -->
        <a href="/settings" class="nav-item" title="Personalizar Agente IA">
            <svg viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </a>
        <!-- System Settings Icon -->
        <a href="/admin" class="nav-item" title="Panel Clásico Anterior">
            <svg viewBox="0 0 24 24"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        </a>

        <!-- Indicador global abajo -->
        <div class="bot-status-indicator" title="Estado Global del Bot"></div>
    </nav>

    <!-- 2. PANEL CENTRAL (Lista de Chats) -->
    <div class="chat-list-panel">
        <div class="list-header">
            <h2>Bandeja de Entrada</h2>
            <div class="list-tabs">
                <a href="/inbox?tab=all" class="tab {tab_all_active}">Todos</a>
                <a href="/inbox?tab=human" class="tab {tab_human_active}">Humanos</a>
            </div>
        </div>
        <div class="chats-container">
            {lista_chats_html}
        </div>
    </div>

    <!-- 3. PANEL DERECHO (Visor de Chat o Estado Vacío) -->
    <div class="chat-viewer-panel">
        {chat_viewer_html}
    </div>
    </div>

    <!-- MENÚ CONTEXTUAL PERSONALIZADO (Click derecho PC o Mantener en Móvil) -->
    <div id="bubbleContextMenu" style="display:none; position:fixed; z-index:9999; background:var(--bg-main); border:1px solid var(--accent-border); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.15); min-width:200px; font-family:var(--font-main); overflow:hidden;">
        <div class="ctx-item" id="ctxReply" style="padding:0.8rem 1rem; cursor:pointer; font-size:0.95rem; border-bottom:1px solid var(--accent-border); color:var(--text-main); display:flex; align-items:center; gap:0.5rem; transition:background 0.2s;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11v3a4 4 0 0 0 4 4h14"/><path d="m8 14-5-5 5-5"/></svg>
            <strong>Responder Nativamente</strong>
        </div>
        <div class="ctx-item" id="ctxQuote" style="padding:0.8rem 1rem; cursor:pointer; font-size:0.95rem; border-bottom:1px solid var(--accent-border); color:var(--text-main); display:flex; align-items:center; gap:0.5rem; transition:background 0.2s;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Citar (Modo Texto)
        </div>
        <div class="ctx-item" id="ctxCopy" style="padding:0.8rem 1rem; cursor:pointer; font-size:0.95rem; color:var(--text-main); display:flex; align-items:center; gap:0.5rem; transition:background 0.2s;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            Copiar Texto
        </div>
    </div>
    <style>
        .ctx-item:hover { background: var(--accent-bg); }
    </style>

    <script>
        // LOGICA DE MENÚ CONTEXTUAL
        let ctxTargetWamid = "";
        let ctxTargetText = "";
        
        document.addEventListener("contextmenu", function(e) {
            const bubble = e.target.closest('.bubble');
            if(bubble) {
                e.preventDefault(); // Evitamos menú del navegador
                
                ctxTargetWamid = bubble.getAttribute('data-wamid');
                ctxTargetText = bubble.innerText;
                
                const cm = document.getElementById("bubbleContextMenu");
                cm.style.display = "block";
                
                let x = e.clientX;
                let y = e.clientY;
                
                if(x + cm.offsetWidth > window.innerWidth) x = window.innerWidth - cm.offsetWidth - 10;
                if(y + cm.offsetHeight > window.innerHeight) y = window.innerHeight - cm.offsetHeight - 10;
                
                cm.style.left = x + "px";
                cm.style.top = y + "px";
                
                const ctxReply = document.getElementById("ctxReply");
                if(ctxTargetWamid) {
                    ctxReply.style.opacity = "1";
                    ctxReply.style.pointerEvents = "auto";
                } else {
                    ctxReply.style.opacity = "0.4";
                    ctxReply.style.pointerEvents = "none";
                }
            }
        });
        
        document.addEventListener("click", function(e) {
            if(!e.target.closest('#bubbleContextMenu')) {
                document.getElementById("bubbleContextMenu").style.display = "none";
            }
        });
        
        document.getElementById("ctxReply").addEventListener("click", function() {
            document.getElementById("bubbleContextMenu").style.display = "none";
            if(ctxTargetWamid) {
                const h = document.getElementById('replyToWamid');
                const p = document.getElementById('replyPreviewContainer');
                const t = document.getElementById('replyPreviewTxt');
                if(h && p && t) {
                    h.value = ctxTargetWamid;
                    t.innerText = ctxTargetText.substring(0, 40) + '...';
                    p.style.display = 'flex';
                    document.getElementById('manualMsgInput').focus();
                }
            }
        });
        
        document.getElementById("ctxQuote").addEventListener("click", function() {
            document.getElementById("bubbleContextMenu").style.display = "none";
            const i = document.getElementById('manualMsgInput');
            if(i) {
                i.value = "> " + ctxTargetText.trim() + "\n\n" + i.value;
                i.focus();
            }
        });
        
        document.getElementById("ctxCopy").addEventListener("click", function() {
            document.getElementById("bubbleContextMenu").style.display = "none";
            navigator.clipboard.writeText(ctxTargetText.trim());
        });
        // DOM AJAX REFRESHER PARA LIVE CHAT (Mantiene posición del scroll y reemplaza listas suavemente)
        setInterval(async () => {
            try {
                // Prevenir caché del navegador
                const url = window.location.href;
                const fetchUrl = url + (url.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                
                const res = await fetch(fetchUrl, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');
                
                // Actualizar Lista de Conversaciones
                const newChats = doc.querySelector('.chats-container');
                const oldChats = document.querySelector('.chats-container');
                if(newChats && oldChats && oldChats.innerHTML !== newChats.innerHTML) {
                    oldChats.innerHTML = newChats.innerHTML;
                }
                
                // Actualizar visibilidad de Chat
                const newScroll = doc.getElementById('chatScroll');
                const oldScroll = document.getElementById('chatScroll');
                if(newScroll && oldScroll) {
                    if (oldScroll.innerHTML !== newScroll.innerHTML) {
                        // Respetar scroll solo si el usuario no ha subido a leer
                        const isAtBottom = (oldScroll.scrollHeight - oldScroll.scrollTop) <= (oldScroll.clientHeight + 50);
                        oldScroll.innerHTML = newScroll.innerHTML;
                        if(isAtBottom) {
                            oldScroll.scrollTop = oldScroll.scrollHeight;
                        }
                    }
                }
            } catch (e) {
                console.warn('Error en Live Chat Polling:', e);
            }
        }, 1500);

        // API CLIENT PARA RESPONDER
        window.enviarMensajeManual = async function(e, wa_id) {
            e.preventDefault();
            const input = document.getElementById('manualMsgInput');
            if(!input) return;
            const msj = input.value.trim();
            if(!msj) return;
            
            // Vaciar y enfocar
            input.value = '';
            input.focus();
            
            // Dibujado optimista instantáneo
            const scroll = document.getElementById('chatScroll');
            if(scroll) {
                const bubble = document.createElement('div');
                bubble.className = "bubble bubble-bot lado-izq";
                bubble.style.border = "1px solid var(--primary-color)";
                bubble.innerText = msj;
                scroll.appendChild(bubble);
                scroll.scrollTop = scroll.scrollHeight;
            }
            
            const replyWamid = document.getElementById('replyToWamid') ? document.getElementById('replyToWamid').value : null;
            if(document.getElementById('replyPreviewContainer')) {
                document.getElementById('replyPreviewContainer').style.display = 'none';
                if(document.getElementById('replyToWamid')) document.getElementById('replyToWamid').value = '';
            }
            
            try {
                await fetch('/api/admin/enviar_manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wa_id: wa_id, texto: msj, reply_to_wamid: replyWamid })
                });
            } catch(e) {
                console.error("Fallo al enviar:", e);
                alert("Error de red conectando con el panel Web.");
            }
        };
    </script>
</body>
</html>
