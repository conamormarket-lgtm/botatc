<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Usuarios - IA-ATC</title>
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 1. Nivel de Color Principal */
            --primary-color: #717f7f;       
            --primary-hover: #2563eb;       
            /* 2. Nivel de Color de Acento */
            --accent-bg: #1e293b;           
            --accent-border: #334155;       
            --accent-hover-soft: #334155;   
            /* 3. Nivel de Color de Fondo General */
            --bg-main: #0f172a;             
            /* 4. Tipografías */
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            /* Otros */
            --text-main: #f8fafc;           
            --text-muted: #94a3b8;          
            --danger-color: #ef4444;        
            --success-color: #10b981;       
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            gap: 8px;
            padding: 8px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        a { text-decoration: none; color: inherit; }

        /* --------- SIDEBAR NAV --------- */
        .sidebar-nav {
            width: 55px;
            background: var(--panel-glass, rgba(15, 23, 42, 0.65));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--accent-border);
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 0;
            z-index: 10;
            flex-shrink: 0;
            overflow: hidden;
        }
        body.nav-top { flex-direction: column; }
        body.nav-top .sidebar-nav {
            width: 100%;
            height: 55px;
            flex-direction: row;
            padding: 0 0.75rem;
            gap: 0.25rem;
        }
        body.nav-top .nav-item { margin-bottom: 0 !important; }
        body.nav-top .sidebar-spacer { flex: 1; }
        .nav-item { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); margin-bottom: 1rem; transition: all 0.2s ease; text-decoration: none; }
        .nav-item:hover { color: var(--text-main); background-color: var(--accent-hover-soft); }
        .nav-item.active { color: var(--primary-color); background-color: rgba(59, 130, 246, 0.1); }
        .nav-item svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .bot-status-indicator { margin-bottom: 5px; width: 12px; height: 12px; border-radius: 50%; background-color: {color_global}; box-shadow: 0 0 10px {color_global}; cursor: pointer; }

        /* --------- MAIN PANEL ------------ */
        .admin-main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            min-width: 0;
            background: var(--panel-glass, rgba(15, 23, 42, 0.65));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--accent-border);
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.25);
        }
        .admin-main-panel::-webkit-scrollbar { width: 6px; }
        .admin-main-panel::-webkit-scrollbar-thumb { background: var(--accent-border); border-radius: 10px; }

        .admin-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-border);
            background: transparent;
        }
        .admin-header h1 {
            margin: 0;
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            padding: 2.5rem;
            max-width: 1040px;
            margin: 0 auto;
            width: 100%;
        }

        .table-card {
            background: rgba(var(--bg-main-rgb, 15, 23, 42), 0.42);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--accent-border);
            border-radius: 16px;
            overflow-x: auto;
            overflow-y: hidden;
            margin-bottom: 3rem;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.25);
        }
        
        .admin-table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            text-align: left;
        }
        .admin-table th {
            background-color: rgba(0,0,0,0.2);
            padding: 1.25rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--accent-border);
        }
        .admin-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--accent-border);
            font-size: 0.9rem;
            color: var(--text-main);
            vertical-align: middle;
        }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tr:hover td { background-color: rgba(255,255,255,0.02); }
        .admin-table td:last-child,
        .admin-table th:last-child { min-width: 300px; }
        .admin-table td:last-child { white-space: nowrap; }

        .badge {
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            background-color: var(--accent-border);
            color: var(--text-main);
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        button.badge { border: 1px solid transparent; cursor: pointer; font-family: var(--font-main); }
        .badge.pendiente { background-color: rgba(239, 68, 68, 0.15); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge.aprobado { background-color: rgba(16, 185, 129, 0.15); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.3); }

        select { background: var(--bg-main); color: var(--text-main); border: 1px solid var(--accent-border); padding: 5px 10px; border-radius: 5px; }
        
        .btn-action {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background-color: var(--primary-color); color: var(--text-main); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); }
        .btn-danger:hover { background-color: var(--danger-color); color: white; }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            body { flex-direction: column; padding: 0; gap: 0; }
            .sidebar-nav {
                flex-direction: row;
                width: 100%;
                height: 65px;
                padding: 0;
                border-right: none;
                border-top: 1px solid var(--accent-border);
                border-left: none;
                border-bottom: none;
                border-radius: 0;
                order: 3;
                justify-content: space-around;
            }
            .nav-item { margin-bottom: 0; }
            .admin-main-panel { order: 1; border: none; border-radius: 0; }
            
            .admin-header { padding: 1.5rem; flex-direction: column; gap: 1rem; align-items: flex-start; }
            .container { padding: 1.5rem; }
            
            /* Responsive tables: overflow horizontal */
            .table-card { overflow-x: auto; width: calc(100vw - 3rem); }
            .admin-table th, .admin-table td { white-space: nowrap; }
        }
    </style>
    <style id="custom-theme-css">
{custom_theme_css}
    </style>
</head>
<body class="nav-{nav_position}">
    {main_nav_html}

    <!-- 2. PANEL PRINCIPAL (Admin Dashboard) -->
    <div class="admin-main-panel">
        <header class="admin-header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Gestión de Usuarios
            </h1>
        </header>

        <div class="container">
            <div class="table-card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>USUARIO</th>
                            <th>NOMBRE VISIBLE</th>
                            <th>ESTADO</th>
                            <th>PERMISOS</th>
                        </tr>
                    </thead>
                    <tbody id="users-body">
                        <tr><td colspan="4" style="text-align:center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const res = await fetch('/api/usuarios/list');
            const usersResp = await res.json();
            const tbody = document.getElementById('users-body');
            tbody.innerHTML = '';
            
            // FIltrar los rechazados para que desaparezcan de la interfaz
            const users = usersResp.filter(u => u.estado !== 'rechazado');

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);font-style:italic;">No hay usuarios pendientes ni aprobados.</td></tr>';
                return;
            }
            
            users.forEach(u => {
                const isAdmin = u.permisos.includes('admin');
                tbody.innerHTML += `<tr>
                        <td><strong>${u.username}</strong></td>
                        <td><input type="text" id="nombre-${u.username}" value="${u.nombre || ''}" placeholder="Nombre visible..." style="background:var(--bg-main); color:var(--text-main); border:1px solid var(--accent-border); padding:5px 8px; border-radius:5px; width:140px; font-size:13px;"></td>
                        <td>
                            <button type="button" id="estadoBadge-${u.username}" class="badge ${u.estado}" onclick="editEstado('${u.username}')">${u.estado}</button>
                            <select id="estado-${u.username}" style="display:none;" onblur="hideEstadoEditor('${u.username}')" onchange="hideEstadoEditor('${u.username}')">
                                <option value="pendiente" ${u.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option>
                                <option value="aprobado" ${u.estado === 'aprobado' ? 'selected' : ''}>Aprobado</option>
                            </select>
                        </td>
                        <td style="display: flex; gap: 0.5rem; align-items: center;">
                            <select id="permiso-${u.username}">
                                <option value="">Estándar</option>
                                <option value="admin" ${isAdmin ? 'selected' : ''}>Admin</option>
                            </select>
                            <button class="btn-action btn-primary" onclick="saveUser('${u.username}')">Guardar</button>
                            <button class="btn-action btn-danger" onclick="rejectUser('${u.username}')" title="Rechazar y ocultar">Rechazar</button>
                        </td>
                    </tr>`;
            });
        }

        function editEstado(username) {
            const badge = document.getElementById(`estadoBadge-${username}`);
            const select = document.getElementById(`estado-${username}`);
            if (!badge || !select) return;
            badge.style.display = 'none';
            select.style.display = 'inline-block';
            select.focus();
        }

        function hideEstadoEditor(username) {
            const badge = document.getElementById(`estadoBadge-${username}`);
            const select = document.getElementById(`estado-${username}`);
            if (!badge || !select) return;
            badge.textContent = select.value;
            badge.className = `badge ${select.value}`;
            select.style.display = 'none';
            badge.style.display = 'inline-block';
        }
        
        async function saveUser(username) {
            const estado = document.getElementById(`estado-${username}`).value;
            const perm = document.getElementById(`permiso-${username}`).value;
            const permisos = perm ? [perm] : [];
            const nombre = document.getElementById(`nombre-${username}`)?.value?.trim() || '';
            
            const res = await fetch('/api/usuarios/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, estado, permisos, nombre})
            });
            
            if (res.ok) {
                // Remove alert to make it smoother
                loadUsers();
            } else {
                alert("Error al actualizar");
            }
        }

        async function rejectUser(username) {
            if(!confirm("¿Estás seguro de rechazar esta solicitud? El usuario desaparecerá de tu listado y no podrá acceder.")) return;
            const permisos = []; // sin permisos
            const nombre = document.getElementById(`nombre-${username}`)?.value?.trim() || '';
            
            const res = await fetch('/api/usuarios/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, estado: 'rechazado', permisos, nombre})
            });
            
            if (res.ok) {
                loadUsers();
            } else {
                alert("Error al rechazar usuario");
            }
        }
        
        loadUsers();
    </script>
</body>
</html>
